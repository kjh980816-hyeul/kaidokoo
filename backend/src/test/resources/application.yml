# 테스트: H2(MySQL 모드) + Flyway 마이그레이션만(시드 제외)으로 결정적 검증.
# ddl-auto=validate 라서 Flyway 스키마와 엔티티 매핑 불일치 시 컨텍스트 로딩이 실패한다(= 슬라이스 검증).
spring:
  datasource:
    url: jdbc:h2:mem:test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: false
