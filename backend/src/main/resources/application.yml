spring:
  application:
    name: fancafe
  profiles:
    # 프로파일 미지정 시 로컬(H2)로 동작. 운영은 SPRING_PROFILES_ACTIVE=prod
    default: local
  jpa:
    hibernate:
      # 스키마는 Flyway 전용. JPA는 검증만 한다 (HARD: 30-constraints-security)
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  config:
    # 로컬 키 파일(gitignored: secrets/). 없으면 무시 — 운영은 환경변수만 사용.
    import: optional:file:./secrets/local.yml

server:
  port: 8080

# 소셜 로그인(ADR-0004) + 씨미 연동(10-seeme). 시크릿은 환경변수 또는 secrets/local.yml에서만.
app:
  auth:
    # OAuth redirect_uri의 베이스. dev=Vite(5173, /api 프록시), prod=https://kaii.co.kr
    base-url: ${APP_BASE_URL:http://localhost:5173}
    # 운영(HTTPS)에서는 true로 (쿠키 Secure 플래그)
    cookie-secure: ${COOKIE_SECURE:false}
  oauth:
    naver:
      client-id: ${OAUTH_NAVER_CLIENT_ID:}
      client-secret: ${OAUTH_NAVER_CLIENT_SECRET:}
    google:
      client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
      client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
    # 카카오는 후속(키 미발급). 키가 비어 있으면 해당 로그인은 404.
  seeme:
    base-url: ${SEEME_BASE_URL:https://ci.me}
    client-id: ${SEEME_CLIENT_ID:}
    client-secret: ${SEEME_CLIENT_SECRET:}
    poll-interval-ms: 60000

---
# 로컬 개발: 설치 0인 H2 (MySQL 호환 모드). 운영은 MySQL 8 (ADR-0002)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:kaidoku;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  flyway:
    # 로컬에만 개발용 시드 데이터 추가 (운영 프로파일엔 미적용)
    locations: classpath:db/migration,classpath:db/seed
  h2:
    console:
      enabled: true
      path: /h2-console

---
# 운영: MySQL 8. 접속정보는 전부 환경변수 (HARD: 시크릿 코드/문서 노출 금지)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
